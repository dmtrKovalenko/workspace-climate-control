; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico32]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 9600
extra_scripts = pre:extra_script.py
board_build.f_cpu = 160000000L
; huge_app.csv (3 MB app, no OTA, smaller SPIFFS) is unconditional so flipping
; ENABLE_PROMETHEUS on at compile time never overflows flash. We don't use OTA
; or SPIFFS — Preferences/NVS lives in its own partition.
board_build.partitions = huge_app.csv
; chain+ lets PIO evaluate #if/#ifdef while walking includes, so the grafana
; stack is *only* compiled when prometheus.h actually pulls it in (i.e. when
; shared/conf.local.h defines PROM_GC_URL and shared/conf.h auto-derives
; ENABLE_PROMETHEUS=1). strict skips libs that don't declare esp32 support.
lib_ldf_mode = chain+
lib_compat_mode = strict
lib_deps =
	adafruit/Adafruit SGP30 Sensor@^2.0.0
	adafruit/DHT sensor library@^1.4.4
	adafruit/Adafruit BusIO@^1.14.1
	adafruit/Adafruit Si7021 Library@^1.5.1
	adafruit/Adafruit BMP280 Library@^2.6.6
	claws/BH1750@^1.3.0
	wifwaf/MH-Z19@^1.5.4
	mobizt/FirebaseJson@^3.0.8
	; Prometheus stack — only compiled when ENABLE_PROMETHEUS resolves to 1
	; (see shared/conf.h auto-derive). Without conf.local.h these are
	; downloaded into .pio/libdeps but never enter the build graph.
	https://github.com/grafana/prometheus-arduino.git#v0.4.0
	https://github.com/grafana/arduino-prom-loki-transport.git
	https://github.com/grafana/arduino-snappy-proto.git
	arduino-libraries/ArduinoHttpClient@^0.6.1
	arduino-libraries/ArduinoBearSSL@^1.7.4
	arduino-libraries/ArduinoECCX08@^1.3.8
